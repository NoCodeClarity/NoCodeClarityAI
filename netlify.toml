# NoCodeClarity AI — Netlify Configuration
# IMPORTANT: In Netlify dashboard, clear ALL build settings from the UI
# (build command, publish directory, functions directory) so this file takes effect.
# UI settings override this file when set.

[build]
  base = "packages/frontend"
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/stream"
  to = "https://YOUR_RENDER_URL.onrender.com/stream"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
