version: '3.8'

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nocodeclarity
      POSTGRES_USER: nocodeclarity
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nocodeclarity}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocodeclarity"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Orchestrator ─────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nocodeclarity:${DB_PASSWORD:-nocodeclarity}@db:5432/nocodeclarity
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WALLET_MNEMONIC: ${WALLET_MNEMONIC}
      ORCHESTRATOR_SECRET: ${ORCHESTRATOR_SECRET}
      HIRO_API_KEY: ${HIRO_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STACKS_NETWORK: ${STACKS_NETWORK:-testnet}
      ORCHESTRATOR_PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3001"

volumes:
  pgdata:
