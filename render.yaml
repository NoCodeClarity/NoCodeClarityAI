# Render.com Blueprint — auto-configures the orchestrator + PostgreSQL
# Deploy: https://render.com/deploy → connect this repo

services:
  - type: web
    name: nocodeclarity-orchestrator
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/NoCodeClarity/NoCodeClarityAI
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # you'll set this manually
      - key: WALLET_MNEMONIC
        sync: false
      - key: STACKS_NETWORK
        value: testnet
      - key: ORCHESTRATOR_SECRET
        generateValue: true  # Render generates a random string
      - key: DATABASE_URL
        fromDatabase:
          name: nocodeclarity-db
          property: connectionString

databases:
  - name: nocodeclarity-db
    plan: free
    databaseName: nocodeclarity
    postgresMajorVersion: "16"
