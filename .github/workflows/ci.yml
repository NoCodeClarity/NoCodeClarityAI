name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests — tools
        run: bun run --cwd packages/tools vitest run src/tests/builders.test.ts

      - name: Unit tests — orchestrator
        run: bun run --cwd packages/orchestrator vitest run src/tests/orchestrator.test.ts

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd packages/frontend && bunx vite build

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [typecheck-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Integration tests (testnet)
        env:
          STACKS_NETWORK: testnet
          HIRO_API_KEY: ${{ secrets.HIRO_API_KEY }}
        run: bun run --cwd packages/tools vitest run src/tests/integration.test.ts
